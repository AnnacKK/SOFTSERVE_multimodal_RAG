<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle RAG Explorer 🛰️</title>
    <style>
        :root {
            --bg: #050a0f;
            --card: #0f172a;
            --text: #f8fafc;
            --accent: #38bdf8;
            --success: #10b981;
            --warning: #f59e0b;
            --refine: #8b5cf6;
            --border: #1e293b;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 40px;
            margin: 0;
            line-height: 1.5;
        }

        .container { max-width: 950px; margin: auto; }

        h1 { font-weight: 800; letter-spacing: -0.025em; margin-bottom: 30px; }

        /* 🔎 Search UI */
        .input-group { display: flex; gap: 10px; margin-bottom: 30px; }
        input {
            flex-grow: 1; padding: 16px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--card);
            color: white; font-size: 1rem; outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }

        button {
            background: var(--accent); color: var(--bg);
            padding: 12px 28px; border: none; border-radius: 8px;
            font-weight: 700; cursor: pointer; transition: all 0.2s;
        }
        button:hover { transform: translateY(-1px); filter: brightness(1.1); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* 📦 Result Card */
        .result-card {
            background: var(--card); padding: 30px; border-radius: 16px;
            border: 1px solid var(--border); display: none;
            position: relative; animation: fadeIn 0.4s ease-out;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }

        .audit-badge {
            position: absolute; top: 25px; right: 30px;
            padding: 6px 14px; border-radius: 99px;
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
            background: #1e293b; border: 1px solid #334155;
        }
        .status-verifying { color: var(--warning); border-color: var(--warning); }
        .status-verified { color: var(--success); border-color: var(--success); }
        .status-corrected { color: var(--refine); border-color: var(--refine); }

        .confidence { color: var(--accent); font-weight: 700; font-size: 0.85rem; margin-bottom: 8px; }

        /* 📝 Answer Text */
        #resAnswer { font-size: 1.05rem; line-height: 1.7; color: #cbd5e1; white-space: pre-wrap; margin-top: 20px;}

        /* 🖼️ NEW: Gallery Grid */
        .gallery-section { margin-top: 40px; }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        .gallery-item {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            transition: transform 0.2s;
        }
        .gallery-item img {
            width: 100%;
            height: 180px;
            object-fit: contain; /* 🟢 Good for technical charts */
            background: #000;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .gallery-desc {
            font-size: 0.85rem;
            color: #94a3b8;
            font-style: italic;
            line-height: 1.4;
            border-left: 2px solid var(--accent);
            padding-left: 10px;
        }

        /* 🔗 Source Block */
        .sources-section { margin-top: 35px; border-top: 1px solid #1e293b; padding-top: 25px; }
        .sources-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-top: 15px; }
        .source-block { background: rgba(30, 41, 59, 0.4); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-decoration: none; display: flex; flex-direction: column; }
        .source-block:hover { border-color: var(--accent); }
        .source-title { color: var(--text); font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .source-url { color: var(--accent); font-size: 0.7rem; opacity: 0.7; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>The Batch: Oracle Explorer 🛰️</h1>

        <div class="input-group">
            <input type="text" id="userInput" placeholder="Ask about AGI, Robotics, or Research...">
            <button onclick="performSearch()" id="searchBtn">Ask Oracle</button>
        </div>

        <div id="resultCard" class="result-card">
            <div id="auditStatus" class="audit-badge">🔍 Waiting</div>
            <div id="resConfidence" class="confidence"></div>
            <h2 id="resHeadline" style="margin-top: 0; font-size: 1.5rem; color: white;"></h2>

            <div id="resAnswer"></div>

            <div class="gallery-section">
                <h4 style="margin: 0; font-size: 0.8rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;">Technical Diagram Gallery</h4>
                <div id="imageGallery" class="gallery-grid"></div>
            </div>

            <div class="sources-section">
                <h4 style="margin: 0; font-size: 0.8rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;">Referenced Sources</h4>
                <div id="sourcesContainer" class="sources-grid"></div>
            </div>
        </div>
    </div>

    <script>
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const socket = new WebSocket(`${protocol}//${window.location.host}/ws/chat`);

        const updateGallery = (gallery) => {
            const container = document.getElementById('imageGallery');
            container.innerHTML = "";

            if (!gallery || gallery.length === 0) {
                container.innerHTML = "<p style='color: #475569; font-size: 0.8rem;'>No technical diagrams were found in the top 6 articles.</p>";
                return;
            }

            gallery.forEach(item => {
                const galleryDiv = document.createElement('div');
                galleryDiv.className = "gallery-item";
                galleryDiv.innerHTML = `
                    <img src="data:image/jpeg;base64,${item.image}" alt="RAG Insight">
                    <div class="gallery-desc">🔍 ${item.description}</div>
                `;
                container.appendChild(galleryDiv);
            });
        };

        const updateSources = (sources) => {
            const container = document.getElementById('sourcesContainer');
            container.innerHTML = "";
            if (sources && sources.length > 0) {
                sources.forEach(source => {
                    const block = document.createElement('a');
                    block.href = source.url || "#";
                    block.target = "_blank";
                    block.className = "source-block";
                    const hostname = source.url ? new URL(source.url).hostname.replace('www.', '') : 'source';
                    block.innerHTML = `
                        <span class="source-title">${source.title}</span>
                        <span class="source-url">${hostname} ↗</span>
                    `;
                    container.appendChild(block);
                });
            }
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const card = document.getElementById('resultCard');
            const btn = document.getElementById('searchBtn');
            const audit = document.getElementById('auditStatus');

            if (data.type === "metadata") {
                card.style.display = "block";
                card.style.opacity = "1";

                // 🟢 Update score, headline, and gallery immediately
                document.getElementById('resConfidence').innerText = `SEARCH SCORE: ${(data.confidence * 100).toFixed(1)}%`;
                document.getElementById('resHeadline').innerText = data.headline;



                audit.innerText = "Verifying... 🔍";
                audit.className = "audit-badge status-verifying";
            }

            if (data.type === "answer") {
                document.getElementById('resAnswer').innerText = data.answer;
                btn.innerText = "Ask Oracle";
                btn.disabled = false;
                // 🟢 NEW: Render all images
                updateGallery(data.gallery);
                updateSources(data.sources);

            }

            if (data.type === "status" && data.status === "verified") {
                audit.innerText = "Verified ✅";
                audit.className = "audit-badge status-verified";
            }

            if (data.type === "error") {
                alert("Error: " + data.text);
                btn.disabled = false;
                btn.innerText = "Ask Oracle";
            }
        };

        function performSearch() {
            const input = document.getElementById('userInput');
            if (!input.value.trim()) return;
            const btn = document.getElementById('searchBtn');
            btn.innerText = "Oracle is thinking...";
            btn.disabled = true;
            document.getElementById('resultCard').style.opacity = "0.5";
            socket.send(JSON.stringify({ query: input.value, mode: "Hybrid" }));
        }
    </script>
</body>
</html>
