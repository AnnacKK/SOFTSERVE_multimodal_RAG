# --- 1. QDRANT DATABASE ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant-db
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
#      nodeSelector:
#        kubernetes.io/hostname: control-plane
      containers:
      - name: qdrant
        image: qdrant/qdrant:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 6333
        resources:
          requests:
            memory: "512Mi" # Minimum RAM to start for weak system
            cpu: "250m"
          limits:
            memory: "1Gi"
        volumeMounts:
        - name: qdrant-storage
          mountPath: /qdrant/storage
      volumes:
      - name: qdrant-storage
        persistentVolumeClaim:
          claimName: qdrant-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant-db
spec:
  selector:
    app: qdrant
  ports:
    - port: 6333
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# --- 3. RAG API ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
    spec:
#      nodeSelector:
#        kubernetes.io/hostname: kind-worker
      containers:
      - name: rag-api
        image: ghcr.io/annackk/multimodalrag:latest
#        command: [ "uvicorn" ]
#        args: [ "api:app", "--host", "0.0.0.0", "--port", "8000", "--loop", "asyncio" ]
        imagePullPolicy: IfNotPresent
        env:
        - name: QDRANT_URL
          value: "http://qdrant-db:6333"
        - name: ROLE
          value: "api"
        - name: QDRANT_HOST
          value: "qdrant-db"
        - name: OLLAMA_BASE_URL
          value: "http://host.docker.internal:11434"
        - name: GR_TOKEN
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: GR_TOKEN
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2.5Gi"
            cpu: "1.5"
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 300
          periodSeconds: 40
        readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rag-api-service
spec:
  type: ClusterIP
  selector:
    app: rag-api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
# --- 4. RAG DASHBOARD ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-dashboard
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: rag-dashboard
  template:
    metadata:
      labels:
        app: rag-dashboard
    spec:
      nodeSelector:
        kubernetes.io/hostname: kind-worker
      containers:
      - name: dashboard
        image: ghcr.io/annackk/multimodalrag:latest
        imagePullPolicy: IfNotPresent
#        command: [ "streamlit", "run" ]
#        args: [ "dashboard.py", "--server.port=8501", "--server.address=0.0.0.0" ]
        env:
        - name: ROLE
          value: "dashboard"
        - name: API_URL
          value: "http://rag-api-service:8000"
        - name: GR_TOKEN
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: GR_TOKEN
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: rag-dashboard-service
spec:
  type: ClusterIP #kind not support load balancer
  selector:
    app: rag-dashboard
  ports:
    - protocol: TCP
      port: 8501
      targetPort: 8501


