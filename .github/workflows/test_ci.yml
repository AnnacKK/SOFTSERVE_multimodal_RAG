name: Multimodal RAG CI/CD

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'documentation/**'
      - 'manifest_examples/**'
  pull_request:
    branches: [ main ]


jobs:
  # Job 1: Linting and Formatting
  quality-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Ruff Auto-Fix
        continue-on-error: true
        run: |
          pip install ruff
          ruff check src/ --fix --unsafe-fixes
          ruff format src/

      - name: Commit and Push Fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 chore: automated ruff quality fixes"
          branch: ${{ github.head_ref || github.ref_name }}

  # Job 2: Functional Testing and Judicial Audit
  test:
    needs: [quality-check]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Maximize Build Space
        run: |
            sudo rm -rf /usr/share/dotnet
            sudo rm -rf /usr/local/lib/android
            sudo rm -rf /opt/ghc
            sudo rm -rf "/usr/local/share/boost"
            sudo rm -rf "$AGENT_TOOLSDIRECTORY"
            df -h # This will show you exactly how much you freed up in the logs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
            python -m pip install --upgrade pip
            pip install --upgrade "giskard[llm]" litellm evaluate google-generativeai
            pip install -r requirements.txt pytest pytest-asyncio
            pip install flashrank
      
            

      - name: Install & Background Ollama
        env:
          OLLAMA_HOST: 0.0.0.0
          # Force CPU execution to prevent the runner from crashing on GPU init
          CUDA_VISIBLE_DEVICES: ""
        run: |
            curl -fsSL https://ollama.com/install.sh | sh
            nohup ollama serve > ollama.log 2>&1 &
            until curl -s http://localhost:11434/api/tags > /dev/null; do sleep 2; done
            sleep 10
            ollama pull qwen2.5:1.5b
            GGUF_PATH="${{ github.workspace }}/src/optimization/LoRa/qwen-tun-adapter.gguf"
            
            # 3. Create the Modelfile dynamically
            # We use FROM to get the base and ADAPTER to point to your new GGUF
            cat <<EOF > Modelfile.ci
            FROM qwen2.5:1.5b
            ADAPTER $GGUF_PATH
            EOF
          
          
          
          
            sleep 10
            ollama create qwen-tun -f Modelfile.ci
            
            # 5. Test it
            ollama list
            

      - name: Inspect Ollama Health
        if: always()
        run: |
          echo "--- OLLAMA LOGS ---"
          cat ollama.log
          echo "--- RAM USAGE ---"
          free -h

      - name: Sanitize Test Files
        run: |
          find src/tests/ -name "*.py" -exec sed -i 's/\x00//g' {} +

      - name: Run Giskard & Judicial Tests
        env:
          QDRANT_URL: http://localhost:6333
          OLLAMA_BASE_URL: http://localhost:11434
          PYTHONPATH: ${{ github.workspace }}
          GR_TOKEN: ${{ secrets.GR_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: pytest src/tests/test_rag.py

      - name: Upload Giskard Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: giskard-report
          path: giskard_report_*.html
      - name: Upload Judge Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: judge-logs
          path: judge_results_*.json
      - name: Display Judge Results
        if: always()
        run: |
            echo "### ⚖️ Judge JSON Output" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
            cat judge_results_*.json >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # Job 3: Dockerize and Deploy
  build-and-push:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    strategy:
      matrix:
        service: [ rag-api, rag-dashboard, data_processing ]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lowercase Repo Name
        run: |
          echo "OWNER_LC=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
            # 2. Login to Amazon ECR
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push RAG API
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/${{ matrix.service }}:latest
            ghcr.io/${{ env.OWNER_LC }}/${{ matrix.service }}:${{ github.sha }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com/${{ matrix.service }}:latest
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com/${{ matrix.service }}:${{ github.sha }}
  deploy-gitops:
      needs: [ build-and-push ]
      runs-on: ubuntu-latest
      if: github.event_name == 'push'
      steps:
        - name: Checkout Infra Repo
          uses: actions/checkout@v4
          with:
            repository: AnnacKK/multimodal-rag-infra
            token: ${{ secrets.GITOPS_TOKEN }}
            path: infra

        - name: Update K8s Manifest Tag
          run: |
            #
            cd infra/base 
            kustomize edit set image ghcr.io/annackk/rag-api=ghcr.io/${{ env.OWNER_LC }}/rag-api:${{ github.sha }}
            kustomize edit set image ghcr.io/annackk/rag-dashboard=ghcr.io/${{ env.OWNER_LC }}/rag-dashboard:${{ github.sha }}
            kustomize edit set image ghcr.io/annackk/data_processing=ghcr.io/${{ env.OWNER_LC }}/data_processing:${{ github.sha }}
        - name: Commit and Push
          run: |
            cd infra
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "🚀 deploy: multimodal-rag version ${{ github.sha }}"
            git push