name: Multimodal RAG CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

jobs:
  # 🧹 Gate 1: Logic, Style, & Modernization (Ruff)
  quality-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Run Ruff Auto-Fix
        # 🟢 continue-on-error ensures we still "Commit" even if Ruff found errors
        continue-on-error: true
        run: |
          pip install ruff
          # 🪄 --unsafe-fixes is the key to fixing E402 and E722 automatically
          ruff check src/ --fix --unsafe-fixes
          ruff format src/

      - name: Commit and Push Fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 chore: automated ruff quality fixes [skip ci]"
          branch: ${{ github.head_ref || github.ref_name }}

  # 🧪 Gate 2: Functional Testing (Pytest)
  test:
    needs: [quality-check] # 🟢 FIXED: Now matches the job name above
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run Unit Tests
        run: pytest src/tests


  build-and-push:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push RAG API
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rag-api:latest
            ghcr.io/${{ github.repository_owner }}/rag-api:${{ github.sha }}