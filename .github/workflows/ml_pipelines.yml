name: Multimodal RAG CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

jobs:
  jobs:
    test-and-lint:
      runs-on: ubuntu-latest
      services:
        qdrant:
          image: qdrant/qdrant:latest
          ports:
            - 6333:6333
      permissions:
        contents: write
      steps:
        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.9'
            cache: 'pip'

        # 1. Lint and Auto-Fix
        - name: Run Ruff Auto-Fix
          continue-on-error: true
          run: |
            pip install ruff
            ruff check src/ --fix --unsafe-fixes
            ruff format src/

        # 2. Setup Environment
        - name: Install Dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt pytest pytest-asyncio

        - name: Install & Background Ollama
          run: |
            curl -fsSL https://ollama.com/install.sh | sh
            nohup ollama serve > ollama.log 2>&1 &
            sleep 10
            ollama pull qwen2.5:1.5b

        # 3. Run Tests (This will now run every time)
        - name: Run Giskard & Judicial Tests
          env:
            QDRANT_URL: http://localhost:6333
            OLLAMA_BASE_URL: http://localhost:11434
            PYTHONPATH: ${{ github.workspace }}
            GR_TOKEN: ${{ secrets.GR_TOKEN }}
          run: pytest src/tests/test_rag.py

        # 4. Push fixes ONLY after tests pass
        - name: Commit and Push Fixes
          if: success()
          uses: stefanzweifel/git-auto-commit-action@v5
          with:
            commit_message: "🤖 chore: automated ruff quality fixes"

        - name: Upload Giskard Report
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: giskard-report
            path: giskard_report.html

  build-and-push:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Lowercase Repo Name
        run: | 
          echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Build and Push RAG API
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}