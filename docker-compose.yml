services:
  qdrant_db:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      # TCP probe is better for WSL2 than curl
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 90s
    restart: always

  data_processing:
    build: .
    # Using 'init: true' helps reap zombie python processes in production
    init: true
    profiles:
      - ingest
    container_name: data_processing
    command: python data_processing/mapping.py
    volumes:
      - .:/app
    environment:
      - QDRANT_HOST=qdrant_db
      - OLLAMA_BASE_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
    depends_on:
      qdrant_db:
        condition: service_healthy
    stop_grace_period: 5s



  rag-dashboard:
    init: true
    build: .
    container_name: rag-dashboard
    command: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - ./src/monitoring_db:/app/src/monitoring_db
    environment:
        - API_URL=http://rag-api:8000
        - MONITORING_DB_PATH=/app/src/monitoring_db/logs.db
    depends_on:
      rag-api:
        condition: service_healthy
    restart: always

  rag-api:
    init: true
    build: .
    container_name: rag-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/.venv
      - hf_cache:/root/.cache/huggingface
      - ./templates:/app/templates
      - ./src/monitoring_db:/app/src/monitoring_db
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - QDRANT_HOST=qdrant_db
      - QDRANT_PORT=6333
      - OLLAMA_NUM_PARALLEL=1 # Set to 1 for 1050 Ti stability
      - OLLAMA_MAX_LOADED_MODELS=1 # Force 1 model at a time to prevent OOM
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    # In production, remove --reload and --reload-dir to save CPU
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --loop asyncio
    depends_on:
      qdrant_db:
        condition: service_healthy
#      data_processing:
#        condition: service_completed_successfully
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - src/monitoring_db/
            - .venv/
            - __pycache__/
            - qdrant_storage/
        - action: rebuild
          path: requirements.txt
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/\")' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
volumes:
  hf_cache:


